<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Minha TV Personalizada</title>
    <link rel="stylesheet" href="Index.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="Index.html">Home</a></li>
                <li><a href="Emissions.html">Programação</a></li>
                <li><a href="admin.html">Admin</a></li>
                <li><a href="login.html">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Área do Administrador</h1>
        <section id="admin-section">
            <h2>Adicionar Novo Programa</h2>
            <form id="program-form">
                <label for="program-day">Dia da Semana:</label>
                <select id="program-day" name="program-day">
                    <option value="Segunda">Segunda</option>
                    <option value="Terça">Terça</option>
                    <option value="Quarta">Quarta</option>
                    <option value="Quinta">Quinta</option>
                    <option value="Sexta">Sexta</option>
                    <option value="Sábado">Sábado</option>
                    <option value="Domingo">Domingo</option>
                </select>
                <label for="program-time">Horário:</label>
                <input type="time" id="program-time" name="program-time" required>
                <label for="program-title">Título do Programa:</label>
                <input type="text" id="program-title" name="program-title" required>
                <button type="submit">Adicionar</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
